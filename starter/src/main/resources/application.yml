spring:
  ai:
    dashscope:
      api-key: ${OPENAI_API_KEY}
      model: deepseek-v4-flush
    vectorstore:
      # Milvus 向量数据库配置（可选）
      milvus:
        host: localhost
        port: 19530
        collection-name: ai_knowledge_milvus
        embedding-dimension: 1536  # 向量维度 取决于所选 Embedding 模型
    embedding:
      model: text-embedding-ada-002 # 或其spring:
    rerank:
      dashscope:
        model: gte-rerank-v2

# Retriever 配置
retriever:
  max-results: 5
  min-score: 0.5
  lambda: 0.5
# 上下文压缩配置
compressor:
  embedding:
    threshold: 0.6          # 句子相似度阈值，低于该值的句子丢弃
    min-sentences: 2        # 每个文档至少保留的句子数（防止过度压缩）
  llm:
    max-input-tokens: 2000  # 单次 LLM 压缩调用允许的最大输入 Token（用于控制成本）

# 外部搜索配置
external:
  search:
    api-key: ${EXTERNAL_SEARCH_API_KEY:}  # Tavily 或 Bing API Key
    provider: tavily  # tavily 或 bing
    tavily:
      url: https://api.tavily.com/search
    bing:
      url: https://api.bing.microsoft.com/v7.0/search

# 日志配置
logging:
  level:
    # 根日志级别
    root: INFO
    
    # 项目包日志级别
    org.example: DEBUG
    
    # Spring 框架日志级别
    org.springframework: WARN
    org.springframework.ai: INFO
    
    # Alibaba Cloud AI 日志级别
    com.alibaba.cloud.ai: INFO
    
    # 数据库相关日志级别
    org.hibernate: WARN
    
    # HTTP 客户端日志级别
    org.apache.http: WARN
    
    # Milvus 客户端日志级别
    io.milvus: WARN
    
    # HikariCP 连接池日志级别
    com.zaxxer.hikari: WARN
  
  # 日志文件配置
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30
  
  # Logback 配置文件
  config: classpath:logback-spring.xml