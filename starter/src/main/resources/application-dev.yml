spring:
  main:
    allow-bean-definition-overriding: true

  application:
    name: knowledge-rag

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/knowledge_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update  # 生产环境建议改为 validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
  ai:
    dashscope:
      api-key: sk-你的DashScope密钥
      chat:
        enabled: true
        base-url: https://dashscope.aliyuncs.com/
        options:
          model: qwen-max
      embedding:
        enabled: true
        base-url: https://dashscope.aliyuncs.com/
        options:
          model: text-embedding-v4
          dimensions: 1536
    vectorstore:
      # Milvus 向量数据库配置（可选）
      milvus:
        host: localhost
        port: 19530
        collection-name: ai_knowledge_milvus
        embedding-dimension: 1536  # 向量维度 取决于所选 Embedding 模型
        embedding-field: vector
        initialize-schema: off
    rerank:
      dashscope:
        model: gte-rerank-v2

# Retriever 配置
retriever:
  max-results: 5
  min-score: 0.5
  lambda: 0.5
# 上下文压缩配置
compressor:
  embedding:
    threshold: 0.6          # 句子相似度阈值，低于该值的句子丢弃
    min-sentences: 2        # 每个文档至少保留的句子数（防止过度压缩）
  llm:
    max-input-tokens: 2000  # 单次 LLM 压缩调用允许的最大输入 Token（用于控制成本）

# 外部搜索配置
external:
  search:
    api-key: ${EXTERNAL_SEARCH_API_KEY:}  # Tavily 或 Bing API Key
    provider: tavily  # tavily 或 bing
    tavily:
      url: https://api.tavily.com/search
    bing:
      url: https://api.bing.microsoft.com/v7.0/search

# JWT 配置
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForProductionUseOnly123456789}
  expiration: 86400000  # 24小时（毫秒）

# Resilience4j 配置
resilience4j:
  circuitbreaker:
    instances:
      llmCall:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      vectorSearch:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s
  retry:
    instances:
      llmCall:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
      vectorSearch:
        max-attempts: 2
        wait-duration: 500ms
  timelimiter:
    instances:
      llmCall:
        timeout-duration: 30s
        cancel-running-future: true
      vectorSearch:
        timeout-duration: 10s
        cancel-running-future: true

# 日志配置
logging:
  level:
    # 根日志级别
    root: INFO
    
    # 项目包日志级别
    org.example: DEBUG
    
    # Spring 框架日志级别
    org.springframework: WARN
    org.springframework.ai: INFO
    
    # Alibaba Cloud AI 日志级别
    com.alibaba.cloud.ai: INFO
    
    # 数据库相关日志级别
    org.hibernate: WARN
    
    # HTTP 客户端日志级别
    org.apache.http: WARN
    
    # Milvus 客户端日志级别
    io.milvus: WARN
    
    # HikariCP 连接池日志级别
    com.zaxxer.hikari: WARN
  
  # 日志文件配置
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30
  
  # Logback 配置文件（控制台文本格式，文件 JSON 格式支持 ELK 采集）
  config: classpath:logback-spring.xml

# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,threaddump
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# Sleuth & Zipkin 分布式追踪配置
  sleuth:
    sampler:
      probability: 1.0  # 采样率 100%（生产环境建议 0.1）
  zipkin:
    base-url: ${ZIPKIN_URL:http://localhost:9411}
    sender:
      type: web