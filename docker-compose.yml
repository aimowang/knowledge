name: knowledge-deploy

services:
  # ===== Nginx 反向代理 =====
  # 为后端 API 提供统一入口
  # 通过 Docker 内部 DNS 访问后端容器 knowledge-rag:8080
  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    image: knowledge-nginx:latest
    container_name: knowledge-nginx
    ports:
      - "80:80"
    volumes:
      - nginx-logs:/var/log/nginx
    depends_on:
      app:
        condition: service_started
    networks:
      - monitoring
    restart: unless-stopped

  # ===== 前端页面（Vue + Nginx，可选）=====
  # 如有完整前端项目，取消下方注释即可启用
  #frontend:
  #  build:
  #    context: ../knowledge-frontend
  #    dockerfile: Dockerfile
  #  image: knowledge-frontend:latest
  #  container_name: knowledge-frontend
  #  ports:
  #    - "80:80"
  #  depends_on:
  #    app:
  #      condition: service_started
  #  networks:
  #    - monitoring
  #  restart: unless-stopped

  # ===== 应用服务 =====
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: knowledge-rag:latest
    container_name: knowledge-rag
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms2g -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/var/log/knowledge-rag/heapdump.hprof
    volumes:
      - app-logs:/var/log/knowledge-rag
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - monitoring
      - milvus-net
    restart: unless-stopped

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: knowledge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./starter/src/main/resources/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./starter/src/main/resources/prometheus/rules.yml:/etc/prometheus/rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - monitoring

  # Grafana 可视化
  grafana:
    image: grafana/grafana:10.2.2
    container_name: knowledge-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - monitoring

  # Alertmanager 告警管理
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: knowledge-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./starter/src/main/resources/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring

  # Zipkin 分布式追踪
  zipkin:
    image: openzipkin/zipkin:2.24
    container_name: knowledge-zipkin
    ports:
      - "9411:9411"
    environment:
      - JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - monitoring

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: knowledge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - monitoring
    restart: unless-stopped

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: knowledge-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-root}
      - MYSQL_DATABASE=knowledge_db
    volumes:
      - mysql-data:/var/lib/mysql
      - ./starter/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - monitoring
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  redis-data:
  mysql-data:
  app-logs:
  nginx-logs:

networks:
  monitoring:
    driver: bridge
  milvus-net:
    external: true
    name: milvus_milvus-net
