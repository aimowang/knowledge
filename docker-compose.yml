version: '3.8'

services:
  # Prometheus 监控
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: knowledge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./starter/src/main/resources/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./starter/src/main/resources/prometheus/rules.yml:/etc/prometheus/rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - monitoring

  # Grafana 可视化
  grafana:
    image: grafana/grafana:10.2.2
    container_name: knowledge-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - monitoring

  # Alertmanager 告警管理
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: knowledge-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./starter/src/main/resources/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring

  # Zipkin 分布式追踪
  zipkin:
    image: openzipkin/zipkin:2.24
    container_name: knowledge-zipkin
    ports:
      - "9411:9411"
    environment:
      - JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - monitoring

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: knowledge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - monitoring

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: knowledge-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-root}
      - MYSQL_DATABASE=knowledge_db
    volumes:
      - mysql-data:/var/lib/mysql
      - ./starter/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - monitoring

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  redis-data:
  mysql-data:

networks:
  monitoring:
    driver: bridge
